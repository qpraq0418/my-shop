<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .product-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; }
    .product-card img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    .product-card button { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    .cart { border-top: 2px solid #333; padding: 20px 0; }
    .cart-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .order-form input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    .order-form button { background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Каталог товаров</h1>
  <div id="products" class="products">Загрузка товаров...</div>

  <h2>Корзина</h2>
  <div id="cart-items" class="cart"></div>
  <p>Итого: <span id="total">0</span> ₽</p>

  <h3>Оформление заказа</h3>
  <form id="orderForm" class="order-form">
    <input type="text" name="name" placeholder="Ваше имя" required>
    <input type="tel" name="phone" placeholder="Телефон" required>
    <button type="submit">Отправить заказ</button>
  </form>
  <div id="message"></div>

  <script>
    // ⚙️ СЮДА ВСТАВЬТЕ ВАШИ ССЫЛКИ
    const PRODUCTS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCWLsmQuxcITOg3hjhKFcXKM6Lj4VIOcRZCm_dSpTncH0DHFDpaTjsniRd3hO-qxEUW3evcdhJMwJT/pub?gid=0&single=true&output=csv';
    const ORDER_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwML-RtpsAuUayi7ES8GNKGOfL-K4h9E9uba81Ntu9RGkQ_CGtC7Zm__5JSV_PhBh_G/exec';

    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    async function loadProducts() {
      try {
        const response = await fetch(PRODUCTS_CSV_URL);
        const csvText = await response.text();
        const rows = csvText.trim().split('\n').slice(1);
        const products = rows.map(row => {
          const [id, name, price, image, description] = row.split(',').map(cell => cell.trim());
          return { id, name, price: parseFloat(price), image, description };
        });
        renderProducts(products);
      } catch (err) {
        document.getElementById('products').innerHTML = 'Ошибка загрузки товаров';
        console.error(err);
      }
    }

    function renderProducts(products) {
      const container = document.getElementById('products');
      container.innerHTML = products.map(p => `
        <div class="product-card">
          <img src="${p.image}" alt="${p.name}">
          <h3>${p.name}</h3>
          <p>${p.description || ''}</p>
          <p><strong>${p.price} ₽</strong></p>
          <button onclick="addToCart('${p.id}', '${p.name}', ${p.price})">В корзину</button>
        </div>
      `).join('');
    }

    window.addToCart = (id, name, price) => {
      const existing = cart.find(item => item.id === id);
      if (existing) existing.quantity++;
      else cart.push({ id, name, price, quantity: 1 });
      saveCart();
      renderCart();
    };

    function renderCart() {
      const container = document.getElementById('cart-items');
      if (cart.length === 0) {
        container.innerHTML = '<p>Корзина пуста</p>';
        document.getElementById('total').textContent = '0';
        return;
      }
      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <span>${item.name} x${item.quantity}</span>
          <span>${item.price * item.quantity} ₽</span>
          <button onclick="removeFromCart('${item.id}')">Удалить</button>
        </div>
      `).join('');
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      document.getElementById('total').textContent = total;
    }

    window.removeFromCart = (id) => {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCart();
    };

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (cart.length === 0) {
        alert('Добавьте товары в корзину');
        return;
      }
      const formData = new FormData(e.target);
      const orderData = {
        name: formData.get('name'),
        phone: formData.get('phone'),
        cart: cart
      };

      document.getElementById('message').textContent = 'Отправка заказа...';
      try {
        const response = await fetch(ORDER_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(orderData)
        });
        const result = await response.json();
        if (result.result === 'success') {
          alert('Заказ успешно оформлен!');
          cart = [];
          saveCart();
          renderCart();
          e.target.reset();
          document.getElementById('message').textContent = '';
        } else {
          throw new Error('Ошибка сервера');
        }
      } catch (err) {
        alert('Ошибка отправки заказа. Попробуйте позже.');
        console.error(err);
        document.getElementById('message').textContent = '';
      }
    });

    loadProducts();
    renderCart();
  </script>
</body>
</html>

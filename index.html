<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ store — дропшиппинг витрина</title>
  <!-- Google Fonts для красивого шрифта -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    /* ----- ТЁМНАЯ СОВРЕМЕННАЯ ТЕМА ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0e14;
      color: #e9edf2;
      line-height: 1.5;
      padding: 24px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Заголовки */
    h1, h2, h3 {
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 32px;
      background: linear-gradient(135deg, #ffffff 0%, #a0b0ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      font-size: 1.8rem;
      margin: 40px 0 20px;
      color: #e0e4f0;
      border-bottom: 1px solid #2a2f3a;
      padding-bottom: 12px;
    }

    h3 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      color: #cdd6f0;
    }

    /* Карточки товаров */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: #161b22;
      border-radius: 24px;
      padding: 20px;
      transition: transform 0.2s ease, box-shadow 0.25s ease;
      border: 1px solid #2d333b;
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px #3d4a5c inset;
      border-color: #4f5e73;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 16px;
      background: #1e2430;
      margin-bottom: 16px;
      border: 1px solid #2a313e;
    }

    .product-name {
      font-weight: 600;
      font-size: 1.2rem;
      margin-bottom: 6px;
      color: #ffffff;
    }

    .product-desc {
      font-size: 0.9rem;
      color: #9aa3b5;
      margin-bottom: 16px;
      flex-grow: 1;
    }

    .product-price {
      font-weight: 700;
      font-size: 1.5rem;
      color: #b4c2ff;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }

    .btn {
      background: #252e3b;
      border: none;
      color: white;
      padding: 12px 16px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #3d4654;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.01em;
      backdrop-filter: blur(4px);
    }

    .btn-primary {
      background: #3f5bff;
      border-color: #5f78ff;
      box-shadow: 0 4px 12px rgba(63, 91, 255, 0.25);
    }

    .btn-primary:hover {
      background: #5470ff;
      border-color: #8295ff;
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(63, 91, 255, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #4a5366;
    }

    .btn-outline:hover {
      background: #1f2630;
      border-color: #7788aa;
    }

    /* Корзина */
    .cart-section {
      background: #131820;
      border-radius: 28px;
      padding: 28px;
      margin-top: 30px;
      border: 1px solid #2b3440;
    }

    .cart-items {
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #262e38;
    }

    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .cart-item-title {
      font-weight: 500;
    }

    .cart-item-price {
      color: #b7c0d0;
      font-feature-settings: "tnum";
    }

    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .quantity-badge {
      background: #1e2632;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid #374151;
    }

    .btn-small {
      background: none;
      border: 1px solid #3e4756;
      color: #b9c2d4;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-small:hover {
      background: #262e3c;
      color: white;
      border-color: #6d7f9e;
    }

    .total-price {
      font-size: 1.8rem;
      font-weight: 600;
      color: #b7c9ff;
      margin: 16px 0 24px;
    }

    /* Форма */
    .form-group {
      margin-bottom: 20px;
    }

    .form-control {
      width: 100%;
      padding: 16px 20px;
      background: #1b232d;
      border: 1.5px solid #2f3a47;
      border-radius: 60px;
      font-size: 1rem;
      color: #f0f4ff;
      font-family: 'Inter', sans-serif;
      transition: border 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-control:focus {
      border-color: #5f7cff;
      box-shadow: 0 0 0 3px rgba(63, 91, 255, 0.2);
    }

    .form-control::placeholder {
      color: #79869c;
    }

    .order-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    #message {
      margin-top: 16px;
      font-weight: 500;
      color: #8fa6ff;
    }

    /* Пустая корзина */
    .empty-cart {
      color: #7c89a1;
      font-style: italic;
      padding: 20px 0;
    }

    /* Адаптация */
    @media (max-width: 600px) {
      body { padding: 16px; }
      h1 { font-size: 2rem; }
      .cart-item { flex-direction: column; align-items: flex-start; gap: 10px; }
    }

    /* Стилизация скроллбара под тёмную тему */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f141a; }
    ::-webkit-scrollbar-thumb { background: #303b4a; border-radius: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h1>✦ STORE</h1>

  <!-- Каталог -->
  <div id="products" class="products-grid">
    <div style="grid-column:1/-1; text-align:center; padding:40px; color:#8f9eb5;">Загрузка товаров...</div>
  </div>

  <!-- Корзина -->
  <div class="cart-section">
    <h2 style="margin-top:0; border-bottom-color:#374151;">🛒 Корзина</h2>
    <div id="cart-items" class="cart-items"></div>
    <div class="total-price">Итого: <span id="total">0</span> ₽</div>

    <h3>Оформление заказа</h3>
    <form id="orderForm">
      <div class="form-group">
        <input type="text" name="name" class="form-control" placeholder="Ваше имя" required>
      </div>
      <div class="form-group">
        <input type="tel" name="phone" class="form-control" placeholder="Телефон" required>
      </div>
      <div class="order-actions">
        <button type="submit" class="btn btn-primary">🚀 Отправить заказ</button>
        <button type="button" class="btn btn-outline" id="clearCartBtn" style="display:none;">Очистить корзину</button>
      </div>
      <div id="message"></div>
    </form>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- НАСТРОЙКИ (замените на свои) ----------
    const PRODUCTS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTCWLsmQuxcITOg3hjhKFcXKM6Lj4VIOcRZCm_dSpTncH0DHFDpaTjsniRd3hO-qxEUW3evcdhJMwJT/pub?gid=0&single=true&output=csv';
    const ORDER_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwML-RtpsAuUayi7ES8GNKGOfL-K4h9E9uba81Ntu9RGkQ_CGtC7Zm__5JSV_PhBh_G/exec';
    // Для обхода CORS (работает и на GitHub Pages)
    const PROXY_URL = 'https://corsproxy.io/?';

    // ---------- СОСТОЯНИЕ ----------
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    // ---------- DOM ЭЛЕМЕНТЫ ----------
    const productsContainer = document.getElementById('products');
    const cartContainer = document.getElementById('cart-items');
    const totalSpan = document.getElementById('total');
    const messageDiv = document.getElementById('message');
    const orderForm = document.getElementById('orderForm');
    const clearCartBtn = document.getElementById('clearCartBtn');

    // ---------- ФУНКЦИИ ОТРИСОВКИ ----------
    function renderCart() {
      if (!cartContainer) return;
      if (cart.length === 0) {
        cartContainer.innerHTML = '<div class="empty-cart">✨ Корзина пуста — добавьте что-нибудь красивое</div>';
        totalSpan.textContent = '0';
        if (clearCartBtn) clearCartBtn.style.display = 'none';
        return;
      }
      
      let html = '';
      let total = 0;
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        html += `
          <div class="cart-item">
            <div class="cart-item-info">
              <span class="cart-item-title">${escapeHtml(item.name)}</span>
              <span class="quantity-badge">x${item.quantity}</span>
            </div>
            <div class="cart-item-actions">
              <span class="cart-item-price">${itemTotal.toLocaleString()} ₽</span>
              <button class="btn-small" onclick="window.removeFromCart('${item.id}')">✕</button>
            </div>
          </div>
        `;
      });
      cartContainer.innerHTML = html;
      totalSpan.textContent = total.toLocaleString();
      if (clearCartBtn) clearCartBtn.style.display = 'inline-block';
    }

    // простая защита от XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // сохранить корзину
    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    // добавить в корзину (вызывается из кнопок)
    window.addToCart = (id, name, price) => {
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ id, name, price: Number(price), quantity: 1 });
      }
      saveCart();
      renderCart();
    };

    window.removeFromCart = (id) => {
      cart = cart.filter(item => item.id !== id);
      saveCart();
      renderCart();
    };

    // очистить корзину
    window.clearCart = () => {
      cart = [];
      saveCart();
      renderCart();
    };
    if (clearCartBtn) clearCartBtn.addEventListener('click', window.clearCart);

    // рендер карточек товаров
    function renderProducts(products) {
      if (!productsContainer) return;
      if (!products || products.length === 0) {
        productsContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Товары не найдены</div>';
        return;
      }
      let cardsHtml = '';
      products.forEach(p => {
        cardsHtml += `
          <div class="product-card">
            <img class="product-image" src="${escapeHtml(p.image) || 'https://via.placeholder.com/300/1e2430/8f9eb5?text=No+image'}" alt="${escapeHtml(p.name)}" loading="lazy">
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-desc">${escapeHtml(p.description || '')}</div>
            <div class="product-price">${p.price.toLocaleString()} ₽</div>
            <button class="btn btn-primary" onclick="addToCart('${p.id}', '${escapeHtml(p.name).replace(/'/g, "\\'")}', ${p.price})">В корзину</button>
          </div>
        `;
      });
      productsContainer.innerHTML = cardsHtml;
    }

    // ---------- ЗАГРУЗКА ТОВАРОВ (с прокси для обхода CORS) ----------
    async function loadProducts() {
      try {
        // используем прокси только если сайт на реальном домене (не file://), 
        // но для GitHub Pages это работает отлично.
        const fetchUrl = PROXY_URL + encodeURIComponent(PRODUCTS_CSV_URL);
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        
        // парсим CSV
        const lines = csvText.trim().split('\n');
        if (lines.length < 2) {
          productsContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center;">В таблице нет товаров</div>';
          return;
        }
        // первая строка — заголовки, пропускаем
        const dataRows = lines.slice(1);
        const products = dataRows.map(row => {
          // простая обработка CSV (учитываем возможные кавычки, но в google sheets их обычно нет)
          const columns = row.split(',').map(cell => cell.trim());
          // id, Название, Цена, Изображение, Описание
          const id = columns[0] || '';
          const name = columns[1] || 'Без названия';
          const price = parseFloat(columns[2]) || 0;
          const image = columns[3] || '';
          const description = columns[4] || '';
          return { id, name, price, image, description };
        }).filter(p => p.id); // отбрасываем пустые строки
        renderProducts(products);
      } catch (error) {
        console.error('Ошибка загрузки:', error);
        productsContainer.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#f28b82;">❌ Ошибка загрузки товаров. Проверьте ссылку или интернет.</div>';
      }
    }

    // ---------- ОТПРАВКА ЗАКАЗА ----------
    orderForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (cart.length === 0) {
        alert('Добавьте товары в корзину');
        return;
      }

      const formData = new FormData(orderForm);
      const orderData = {
        name: formData.get('name').trim(),
        phone: formData.get('phone').trim(),
        cart: cart
      };

      if (!orderData.name || !orderData.phone) {
        alert('Заполните имя и телефон');
        return;
      }

      messageDiv.textContent = '⏳ Отправка заказа...';
      
      try {
        const response = await fetch(ORDER_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(orderData),
          // для CORS с Apps Script заголовок не обязателен, но можно
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          // Apps Script ожидает JSON в body, заголовок можно не ставить
        });
        const result = await response.json();
        if (result.result === 'success') {
          messageDiv.textContent = '✅ Заказ успешно оформлен! Спасибо!';
          cart = [];
          saveCart();
          renderCart();
          orderForm.reset();
        } else {
          throw new Error('Ошибка сервера');
        }
      } catch (err) {
        console.error(err);
        messageDiv.textContent = '⚠️ Ошибка отправки. Попробуйте позже.';
      }
    });

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    loadProducts();
    renderCart();
  })();
</script>
</body>
</html>
